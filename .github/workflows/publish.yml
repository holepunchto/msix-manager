name: Publish
on:
  push:
    tags:
      - v*
permissions:
  id-token: write
  contents: read
jobs:
  prebuild:
    strategy:
      matrix:
        include:
          - os: windows-2022
            platform: win32
            arch: x64
          - os: windows-2022
            platform: win32
            arch: arm64
    runs-on: ${{ matrix.os }}
    name: Build / ${{ matrix.platform }}-${{ matrix.arch }}
    steps:
      - uses: holepunchto/actions/bare-base@v1
      - uses: holepunchto/actions/compile-prebuilds@v1
        with:
          platform: ${{ matrix.platform }}
          arch: ${{ matrix.arch }}
          upload: true
  publish:
    runs-on: ubuntu-latest
    environment:
      name: npm
    needs: prebuild
    name: Publish
    steps:
      - uses: holepunchto/actions/node-base@v1
      - uses: holepunchto/actions/download-prebuilds@v1
      - run: npm publish --ignore-scripts
